name: ci
on: [push, pull_request]
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: pip install packaging

      # yarn install runs the `install` script (node-gyp rebuild of the native
      # addons + genversion), so the native .node files exist before webpack.
      - run: yarn install --frozen-lockfile

      - run: yarn lint

      - run: yarn test

      - run: yarn production
